name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local development setup
        run: supabase db start

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify generated types are checked in
        run: |
          # The committed file comes from `gen types --linked` (per CLAUDE.md
          # workflow), which emits a vestigial __InternalSupabase type marker.
          # `gen types --local` (used here in CI) does not emit it. The marker
          # is inert in @supabase/supabase-js v2.101.1 — it's Omit'd from every
          # type reference in the client and never actually read. Strip it from
          # the committed file before comparing so this check only catches real
          # schema drift, not the mode-dependent marker.
          sed '/^  \/\/ Allows to automatically/,/^  }$/d' \
            src/types/database.types.ts > /tmp/committed.ts
          supabase gen types typescript --local > src/types/database.types.ts
          npx prettier --write src/types/database.types.ts
          if ! diff -u /tmp/committed.ts src/types/database.types.ts; then
            echo ""
            echo "Detected schema drift in src/types/database.types.ts (diff above)."
            echo "Regenerate locally with:"
            echo "  pnpm supabase gen types typescript --linked > src/types/database.types.ts && pnpm format"
            exit 1
          fi

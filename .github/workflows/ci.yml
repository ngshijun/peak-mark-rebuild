name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local development setup
        run: supabase db start

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify generated types are checked in
        run: |
          supabase gen types typescript --local > src/types/database.types.ts
          npx prettier --write src/types/database.types.ts
          if ! git diff --exit-code --quiet src/types/database.types.ts; then
            echo "Detected uncommitted changes to database types. See diff below:"
            git diff src/types/database.types.ts
            exit 1
          fi

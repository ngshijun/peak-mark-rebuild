# Edge Functions
# All functions use verify_jwt = false because:
# 1. Functions that need auth handle it internally via getAuthenticatedUser()
# 2. Relay-level JWT verification is incompatible with ECC (P-256) JWT signing keys
# 3. Supabase recommends function-owned auth over relay verification

[functions.generate-session-summary]
verify_jwt = false

[functions.create-checkout-session]
verify_jwt = false

[functions.create-portal-session]
verify_jwt = false

[functions.sync-subscription]
verify_jwt = false

[functions.modify-subscription]
verify_jwt = false

[functions.cancel-subscription]
verify_jwt = false

[functions.preview-upgrade]
verify_jwt = false

[functions.send-contact-email]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.keep-current-plan]
verify_jwt = false

# Storage Buckets

[storage.buckets.avatars]
public = true
file_size_limit = "1MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/gif", "image/webp", "image/svg+xml"]

[storage.buckets."question-images"]
